groups:
  - id: "example-group-1"
    name: "Example Group 1"
    # `monitor_ids` is the preferred field name. `monitors` is also accepted
    # for backward compatibility and normalized to the same internal value.
    monitor_ids:
      - "example-monitor-1"
      - "example-monitor-3"
      - "example-monitor-4"

monitors:
  - id: "example-monitor-1"
    name: "Example Monitor 1"
    description: "This is an example monitor checking example.com"
    interval: "1m"
    type: "http"
    http:
      method: "GET"
      skip_tls_verify: false
      url: "https://example.com"
      expected_status_codes:
        - 200
        - 301
        - 302
        - 400
      headers:
        User-Agent: "EyrieMonitor/1.0"
      timeout_seconds: 30
  - id: "example-monitor-3"
    name: "Example Monitor 3"
    description: "This is an example monitor checking example.net"
    interval: "1m"
    type: "tcp"
    checker_names:
      - "us-east-1-public-checker"
      - "us-west-1-public-checker"
    tcp:
      address: "example.net:443"
      use_tls: true
      timeout_seconds: 15
  - id: "example-monitor-4"
    name: "Example Monitor 4"
    description: "This is an example monitor checking example.org"
    interval: "1m"
    type: "icmp"
    icmp:
      host: "1.1.1.1"
      count: 1
      timeout_seconds: 5
  - id: "example-monitor-2"
    name: "Example Monitor 2"
    interval: "5m"
    type: "redis"
    redis:
      address: "127.0.0.1:6379"
      timeout_seconds: 10
  - id: "example-github-1"
    name: "GitHub Status Monitor"
    interval: "2m"
    type: "http"
    http:
      method: "GET"
      skip_tls_verify: false
      url: "https://github.com/healthz"
      expected_status_codes:
        - 200
      headers:
        User-Agent: "EyrieMonitor/1.0"
        X-GitHub-Api-Version: "2022-11-28"
        Accept: "text/plain"
      timeout_seconds: 15
  - id: "example-postgres-1"
    name: "Primary PostgreSQL"
    interval: "1m"
    type: "postgres"
    checker_names:
      - "us-east-1-public-checker"
    postgres:
      dsn: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
      timeout_seconds: 10
  - id: "example-mysql-1"
    name: "Primary MySQL"
    interval: "1m"
    type: "mysql"
    mysql:
      dsn: "root:password@tcp(127.0.0.1:3306)/eyrie"
      timeout_seconds: 10
  - id: "example-mssql-1"
    name: "Primary SQL Server"
    interval: "1m"
    type: "mssql"
    mssql:
      dsn: "sqlserver://sa:Password123!@127.0.0.1:1433?database=master"
      timeout_seconds: 10
  - id: "example-clickhouse-tcp-1"
    name: "Primary ClickHouse (TCP)"
    interval: "1m"
    type: "clickhouse"
    clickhouse:
      dsn: "clickhouse://default:@127.0.0.1:9000/default"
      timeout_seconds: 10
  - id: "example-clickhouse-http-1"
    name: "Primary ClickHouse (HTTP)"
    interval: "1m"
    type: "clickhouse"
    clickhouse:
      dsn: "clickhouse://default:@127.0.0.1:8123/default?protocol=http"
      timeout_seconds: 10
