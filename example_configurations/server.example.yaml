server:
  host: "0.0.0.0"
  port: 8600
  log_level: "INFO"

metadata:
  title: "Eyrie Status Page"
  show_last_updated: true

registered_checkers:
  - name: "us-east-1-public-checker"
    region: "us-east-1"
    api_key: "us-east-1-api-key-here"
  - name: "us-west-1-public-checker"
    region: "us-west-1"
    api_key: "us-west-1-api-key-here"
  - name: "eu-west-1-public-checker"
    region: "eu-west-1"
    api_key: "eu-west-1-api-key-here"
  - name: "eu-central-1-public-checker"
    region: "eu-central-1"
    api_key: "eu-central-1-api-key-here"
  - name: "ap-southeast-1-public-checker"
    region: "ap-southeast-1"
    api_key: "ap-southeast-1-api-key-here"

database:
  path: "/var/lib/eyrie/database.db"

task_queue:
  processor:
    producer_address: "mem://processor_tasks"
    consumer_address: "mem://processor_tasks"
  ingester:
    producer_address: "mem://ingester_tasks"
    consumer_address: "mem://ingester_tasks"
  alerter:
    producer_address: "mem://alerter_tasks"
    consumer_address: "mem://alerter_tasks"

dataset:
  retention_days: 90
  processing_lookback_minutes: 10
  per_region_failure_threshold_percent: 40
  failure_threshold_percent: 50
  degraded_threshold_minutes: 10
  failure_threshold_minutes: 15

alerting:
  webhook:
    enabled: false
    url: "https://example.com/webhook"
    hmac_secret: "your-hmac-secret-here"
    custom_headers:
      X-Environment: "production"
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/XXX/YYY"
  teams:
    enabled: false
    webhook_url: "https://example.webhook.office.com/webhookb2/..."
  ntfy:
    enabled: false
    topic_url: "https://ntfy.sh/eyrie-alerts"
    access_token: "ntfy-access-token"
    priority: 4

sentry:
  dsn: ""
  error_sample_rate: 1.0
  traces_sample_rate: 1.0
  debug: false
  trace_outgoing_requests: false
